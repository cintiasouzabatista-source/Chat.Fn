<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Day Pro - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .chat-container { height: calc(100vh - 180px); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col h-screen font-sans">

    <header class="p-4 glass sticky top-0 z-10">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold text-blue-400">Bank Day Pro</h1>
            <div class="flex gap-4">
                <i class="fas fa-eye text-slate-400 cursor-pointer"></i>
                <i class="fas fa-moon text-blue-400"></i>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-3 text-center">
            <div class="p-2 rounded-lg bg-slate-800/50">
                <p class="text-xs text-slate-400">Saldo Geral</p>
                <p id="total-saldo" class="text-lg font-semibold text-emerald-400">R$ 0,00</p>
            </div>
            <div class="p-2 rounded-lg bg-slate-800/50">
                <p class="text-xs text-slate-400">Cartões</p>
                <p id="total-cartao" class="text-lg font-semibold text-rose-400">R$ 0,00</p>
            </div>
            <div class="col-span-2 p-2 rounded-lg bg-blue-900/20 border border-blue-500/30">
                <p class="text-xs text-slate-400">Líquido Disponível</p>
                <p id="total-liquido" class="text-xl font-bold text-white">R$ 0,00</p>
            </div>
        </div>
    </header>

    <main id="chat-box" class="chat-container overflow-y-auto p-4 space-y-4 flex flex-col">
        <div class="bg-blue-600 self-start p-3 rounded-2xl rounded-tl-none max-w-[80%] text-sm">
            Olá! Digite suas movimentações. Ex: "Gastei 50 no mercado" ou "Comprei 300 cartão 3x".
        </div>
    </main>

    <footer class="p-4 glass mt-auto">
        <div class="flex gap-2">
            <input type="text" id="user-input" placeholder="O que aconteceu agora?" 
                class="w-full bg-slate-900 border border-slate-700 rounded-full px-4 py-3 focus:outline-none focus:border-blue-500 text-white">
            <button onclick="processarMensagem()" class="bg-blue-600 hover:bg-blue-500 w-12 h-12 rounded-full flex items-center justify-center transition">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <script>
        let saldo = 0;
        let cartoes = 0;

        function processarMensagem() {
            const input = document.getElementById('user-input');
            const texto = input.value.toLowerCase();
            if (!texto) return;

            adicionarMensagem(input.value, 'user');

            // Regex para extrair valores numéricos
            const valorMatch = texto.match(/\d+([.,]\d{2})?/);
            if (!valorMatch) {
                adicionarMensagem("Não entendi o valor. Tente algo como 'Gastei 50'.", 'bot');
                input.value = '';
                return;
            }

            const valor = parseFloat(valorMatch[0].replace(',', '.'));
            
            // Palavras-chave
            const entradaKeywords = ['recebi', 'entrou', 'ganhei', 'quitei'];
            const saidaKeywords = ['gastei', 'comprei', 'paguei'];
            const eCartao = texto.includes('cartão') || texto.includes('cartao') || texto.includes('3x');

            let tipo = "";

            if (entradaKeywords.some(k => texto.includes(k))) {
                saldo += valor;
                tipo = "entrada";
            } else if (saidaKeywords.some(k => texto.includes(k))) {
                if (eCartao) {
                    cartoes += valor;
                    tipo = "cartao";
                } else {
                    saldo -= valor;
                    tipo = "saida";
                }
            }

            atualizarDashboard();
            responderBot(tipo, valor, eCartao);
            input.value = '';
            
            const chat = document.getElementById('chat-box');
            chat.scrollTop = chat.scrollHeight;
        }

        function adicionarMensagem(texto, autor) {
            const chat = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = autor === 'user' 
                ? "bg-slate-700 self-end p-3 rounded-2xl rounded-tr-none max-w-[80%] text-sm"
                : "bg-blue-600 self-start p-3 rounded-2xl rounded-tl-none max-w-[80%] text-sm";
            div.innerText = texto;
            chat.appendChild(div);
        }

        function responderBot(tipo, valor, eCartao) {
            let msg = "";
            if (tipo === "entrada") msg = `Boa! Adicionei R$ ${valor.toFixed(2)} ao seu saldo.`;
            else if (tipo === "cartao") msg = `Registrado no crédito: R$ ${valor.toFixed(2)}.`;
            else if (tipo === "saida") msg = `Ok, debitei R$ ${valor.toFixed(2)} do seu saldo.`;
            
            setTimeout(() => adicionarMensagem(msg, 'bot'), 500);
        }

        function atualizarDashboard() {
            document.getElementById('total-saldo').innerText = `R$ ${saldo.toFixed(2)}`;
            document.getElementById('total-cartao').innerText = `R$ ${cartoes.toFixed(2)}`;
            document.getElementById('total-liquido').innerText = `R$ ${(saldo - cartoes).toFixed(2)}`;
        }
    </script>
</body>
</html>

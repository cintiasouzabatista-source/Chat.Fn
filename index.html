<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BankDay">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Financas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="p-3 header-bg shadow-sm">
    <div class="flex justify-between items-center mb-3">
        <h1 class="text-lg font-black text-black-200">Chat Financeiro</h1>
        <div class="flex items-center gap-3">
            <button id="btnSaldoProjetado" onclick="toggleSaldoProjetado()"
                class="text-slate-400 hover:text-blue-400 transition-colors"
                title="Projetar saldo pro próximo mês">
                <i class="fas fa-forward-step"></i>
            </button>
            <button onclick="toggleVisibility()"><i id="eye-icon" class="fas fa-eye text-slate-400"></i></button>
            <button onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon text-blue-500"></i></button>
        </div>
    </div>

    <div class="flex justify-center items-center gap-4 mb-3">
        <button onclick="mudarMes(-1)" class="bg-black/10 light-mode:bg-slate-200 w-8 h-8 rounded-full text-sm">
            <i class="fas fa-chevron-left"></i>
        </button>
        <h2 id="mesAtual" class="font-bold text-sm min-w-[120px] text-center"></h2>
        <button onclick="mudarMes(1)" class="bg-black/10 light-mode:bg-slate-200 w-8 h-8 rounded-full text-sm">
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>

   <div class="mb-2 p-3 rounded-xl bg-slate-800 light-mode:bg-white light-mode:border light-mode:border-slate-200 text-white light-mode:text-slate-900 text-center shadow-md">
   <p class="text- uppercase font-black opacity-80">LÍQUIDO DISPONÍVEL</p>
        <p id="card-liquido" class="text-2xl font-black val-field">R$ 0,00</p>
    </div>

    <div class="grid grid-cols-2 gap-2">
        <div class="bg-black/5 light-mode:bg-slate-100 p-2 rounded-lg text-center border border-black/5">
      <p class="text- uppercase font-black text-slate-400">ENTRADA</p>

            <p id="card-entradas" class="text-sm font-bold text-emerald-500 val-field">R$ 0,00</p>
        </div>
        <div class="bg-black/5 light-mode:bg-slate-100 p-2 rounded-lg text-center border border-black/5">
         <p class="text- uppercase font-black text-slate-400">SAÍDA</p>
            <p id="card-saidas" class="text-sm font-bold text-orange-500 val-field">R$ 0,00</p>
        </div>
        <div class="bg-black/5 light-mode:bg-slate-100 p-2 rounded-lg text-center border border-black/5">
            <p class="text- uppercase font-black text-slate-400">SALDO ATUAL</p>
            <p id="card-saldo" class="text-sm font-bold text-blue-500 val-field">R$ 0,00</p>
        </div>
        <div class="bg-black/5 light-mode:bg-slate-100 p-2 rounded-lg text-center border border-black/5">
        <p class="text- uppercase font-black text-slate-400">CARTÕES</p>
            <p id="card-cartoes" class="text-sm font-bold text-rose-500 val-field">R$ 0,00</p>
        </div>
    </div>
</header>

<main id="chat-box"></main>

<footer class="bg-[var(--card)] border-t border-slate-700/30">
    <div class="p-3 pb-2">
        <div class="flex gap-2 items-center bg-[var(--input-bg)] rounded-2xl px-4 py-1 border border-slate-700/30">
            <input type="text" id="user-input" placeholder="Ex: Recebi 1000 | Gastei 50 | Cartão 300 3x"
                class="w-full bg-transparent py-3 focus:outline-none text-sm text-inherit"
                onkeydown="if(event.key==='Enter') processarMensagem()">
            <button onclick="processarMensagem()" class="text-blue-500 p-2">
                <i class="fas fa-paper-plane text-xl"></i>
            </button>
        </div>
    </div>

    <div class="flex justify-around px-2 py-1">
        <button onclick="abrirExtrato()" class="menu-btn" data-page="extrato">
            <i class="fas fa-list-ul"></i>
            <span>Extrato</span>
        </button>
        <button onclick="abrirGraficos()" class="menu-btn" data-page="graficos">
            <i class="fas fa-chart-pie"></i>
            <span>Gráficos</span>
        </button>
        <button onclick="abrirFaturas()" class="menu-btn" data-page="faturas">
            <i class="fas fa-credit-card"></i>
            <span>Faturas</span>
        </button>
        <button onclick="toggleMenu()" id="btnMenu" class="menu-btn" data-page="mais">
            <i class="fas fa-ellipsis-h"></i>
            <span>Mais</span>
        </button>
    </div>

    <div class="menu-dropdown" id="menuDropdown">
        <button onclick="abrirContasCartoes()">Contas e Cartões</button>
        <button onclick="abrirReserva()">Reserva</button>
        <button onclick="abrirContasFixas()">Contas Fixas</button>
        <button onclick="resetarTransacoes()">Resetar Transações</button>
        <button onclick="resetarTudo()">Resetar Tudo</button>
    </div>
</footer>

<!-- MODAL GRAFICOS -->
<div id="modal-graficos" class="modal">
    <div class="modal-content" style="max-width: 600px; max-height: 90vh;">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold">Gráficos - <span id="grafico-mes"></span></h2>
            <button onclick="fecharGraficos()" class="text-slate-400"><i class="fas fa-times"></i></button>
        </div>

        <div class="flex gap-2 mb-4">
            <button onclick="trocarGrafico('categoria')" id="btn-cat" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm font-bold">Categoria</button>
            <button onclick="trocarGrafico('tipo')" id="btn-tipo" class="flex-1 bg-slate-700 text-slate-300 py-2 rounded-lg text-sm font-bold">Entrada vs Saída</button>
        </div>

        <div style="height: 300px;">
            <canvas id="grafico-canvas"></canvas>
        </div>

        <div id="grafico-legenda" class="mt-4 text-xs space-y-1"></div>
    </div>
</div>

<!-- MODAL FATURAS -->
<div id="modal-faturas" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold">Faturas - <span id="fatura-mes"></span></h2>
            <button onclick="fecharFaturas()" class="text-slate-400"><i class="fas fa-times"></i></button>
        </div>
        <div id="lista-faturas" class="space-y-3 max-h-96 overflow-y-auto"></div>
    </div>
</div>

<!-- MODAL CONTAS CARTOES -->
<div id="modal-contas-cartoes" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold">Contas e Cartões</h2>
            <button onclick="fecharContasCartoes()" class="text-slate-400"><i class="fas fa-times"></i></button>
        </div>

        <div class="flex gap-2 mb-4">
            <button onclick="abaContaCartao('contas')" id="aba-contas" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm font-bold">Contas</button>
            <button onclick="abaContaCartao('cartoes')" id="aba-cartoes" class="flex-1 bg-slate-700 text-slate-300 py-2 rounded-lg text-sm font-bold">Cartões</button>
        </div>

        <div id="lista-contas-cartoes" class="space-y-2 mb-4 max-h-64 overflow-y-auto"></div>

        <button onclick="adicionarContaCartao()" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold">
            <i class="fas fa-plus mr-2"></i>Adicionar
        </button>
    </div>
</div>
<!-- MODAL ADD CONTA -->
<div id="modal-add-conta" class="modal">
    <div class="modal-content">
        <h3 class="font-bold mb-4 text-lg">Nova Conta</h3>
        <label class="text-xs opacity-70">Nome da Conta</label>
        <input type="text" id="conta-nome" class="w-full p-2 rounded-lg border mb-3 text-sm" placeholder="Ex: Nubank">
        
        <label class="text-xs opacity-70">Saldo Inicial - opcional</label>
        <input type="number" id="conta-saldo" step="0.01" class="w-full p-2 rounded-lg border mb-4 text-sm" placeholder="Ex: 1000.00">
        
        <div class="flex gap-2">
            <button onclick="fecharModalAddConta()" class="flex-1 bg-slate-600 text-white py-2 rounded-lg">Cancelar</button>
            <button onclick="salvarConta()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold">Salvar</button>
        </div>
    </div>
</div>
<!-- MODAL ADD CARTAO -->
<div id="modal-add-cartao" class="modal">
    <div class="modal-content">
        <h3 class="font-bold mb-4 text-lg">Novo Cartão</h3>
        <label class="text-xs opacity-70">Nome do Cartão</label>
        <input type="text" id="cartao-nome" class="w-full p-2 rounded-lg border mb-3 text-sm" placeholder="Ex: Nubank">

        <label class="text-xs opacity-70">Dia de Fechamento</label>
        <input type="number" id="cartao-fechamento" min="1" max="31" class="w-full p-2 rounded-lg border mb-3 text-sm" placeholder="Ex: 7">

        <label class="text-xs opacity-70">Dia de Vencimento</label>
        <input type="number" id="cartao-vencimento" min="1" max="31" class="w-full p-2 rounded-lg border mb-4 text-sm" placeholder="Ex: 15">

        <div class="flex gap-2">
            <button onclick="fecharModalAddCartao()" class="flex-1 bg-slate-600 text-white py-2 rounded-lg">Cancelar</button>
            <button onclick="salvarCartao()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold">Salvar</button>
        </div>
    </div>
</div>

<!-- MODAL EXTRATO -->
<div id="modal-extrato" class="modal">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold">Extrato</h2>
            <button onclick="fecharExtrato()" class="text-slate-400"><i class="fas fa-times"></i></button>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-3 text-sm">
            <select id="filtro-tipo" class="p-2 rounded" onchange="filtrarExtrato()">
                <option value="">Todos os tipos</option>
                <option value="entrada">Entrada</option>
                <option value="saida">Saída</option>
                <option value="cartao">Cartão</option>
            </select>
            <select id="filtro-categoria" class="p-2 rounded" onchange="filtrarExtrato()">
                <option value="">Todas categorias</option>
            </select>
            <select id="filtro-conta" class="p-2 rounded" onchange="filtrarExtrato()">
                <option value="">Todas contas</option>
            </select>
            <input type="month" id="filtro-mes" class="p-2 rounded" onchange="filtrarExtrato()">
        </div>

        <div id="lista-extrato" class="max-h-96 overflow-y-auto space-y-2"></div>
        <div id="total-extrato" class="mt-3 pt-3 border-t border-slate-600 text-right font-bold"></div>
    </div>
</div>

<!-- MODAL EDITAR -->
<div id="modal" class="modal" onclick="if(event.target===this) fecharModalSemSalvar()">
    <div class="modal-content">
        <h3 class="font-bold mb-4 text-lg">Editar Transação</h3>

        <label class="text-xs opacity-70">Descrição</label>
        <input type="text" id="edit-desc" class="w-full p-2 rounded-lg border mb-3 text-sm">

        <label class="text-xs opacity-70">Valor</label>
        <div id="info-parcela" class="text-xs text-blue-400 mb-3 hidden"></div>
        <input type="number" id="edit-valor" step="0.01" class="w-full p-2 rounded-lg border mb-3 text-sm">

        <label class="text-xs opacity-70">Data</label>
        <input type="date" id="edit-data" class="w-full p-2 rounded-lg border mb-3 text-sm">

        <label class="text-xs opacity-70">Tipo</label>
        <select id="edit-tipo" class="w-full p-2 rounded-lg border mb-3 text-sm" onchange="atualizarCategorias()">
            <option value="entrada">Entrada</option>
            <option value="saida">Saída</option>
            <option value="cartao">Cartão</option>
        </select>

        <label class="text-xs opacity-70">Categoria</label>
        <select id="edit-categoria" class="w-full p-2 rounded-lg border mb-3 text-sm"></select>

        <label class="text-xs opacity-70">Conta/Cartão</label>
        <select id="edit-conta" class="w-full p-2 rounded-lg border mb-4 text-sm"></select>

        <div class="flex justify-between items-center">
            <button onclick="excluirMensagem()" class="text-rose-500 font-bold">Excluir</button>
            <button onclick="fecharModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Salvar</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="chart.js"></script>
<script src="script.js"></script>
</body>
</html>

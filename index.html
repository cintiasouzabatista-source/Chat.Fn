<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bank Day Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --input-bg: #1e293b; }
       .light-mode { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --input-bg: #ffffff; }

        body { background-color: var(--bg); color: var(--text); transition: 0.3s; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
       .header-bg { background-color: var(--card); border-bottom: 1px solid rgba(0,0,0,0.1); }
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        
       .message-fade { animation: fadeOut 1s forwards 7s; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
        
       .hidden-val { filter: blur(6px); }
       .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        
       .grid-3-2 { display: grid; grid-template-columns: repeat(6,1fr); gap: 0.5rem; }
       .grid-3-2 > div { grid-column: span 2; }
       .grid-3-2 > div:nth-child(4) { grid-column: 2 / span 2; }
       .grid-3-2 > div:nth-child(5) { grid-column: 4 / span 2; }
    </style>
</head>
<body>

    <header class="p-3 header-bg shadow-sm shrink-0">
        <div class="flex justify-between items-center mb-3">
            <h1 class="text-lg font-black text-blue-500 italic">BANK DAY PRO</h1>
            <div class="flex gap-4">
                <button onclick="toggleVisibility()"><i id="eye-icon" class="fas fa-eye text-slate-400"></i></button>
                <button onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon text-blue-500"></i></button>
            </div>
        </div>
        
        <!-- Seletor de Mês -->
        <div class="flex justify-center items-center gap-4 mb-3">
            <button onclick="mudarMes(-1)" class="bg-black/10 light-mode:bg-slate-200 w-8 h-8 rounded-full text-sm">
                <i class="fas fa-chevron-left"></i>
            </button>
            <h2 id="mesAtual" class="font-bold text-sm min-w-[120px] text-center"></h2>
            <button onclick="mudarMes(1)" class="bg-black/10 light-mode:bg-slate-200 w-8 h-8 rounded-full text-sm">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <!-- Cards 3+2 -->
        <div class="grid-3-2">
            <div class="bg-black/5 light-mode:bg-slate-100 p-2 rounded-lg text-center border border-black/5">
                <p class="text-[8px] uppercase font-bold text-slate-500">Entradas</p>
                <p id="card-entradas" class="text-xs font-bold text-emerald-500 val-field">R$ 0,00</p>
            </div>
            <div class="bg-black/5 light-mode:bg-slate-100 p-2 rounded-lg text-center border border-black/5">
                <p class="text-[8px] uppercase font-bold text-slate-500">Saídas</p>
                <p id="card-saidas" class="text-xs font-bold text-orange-500 val-field">R$ 0,00</p>
            </div>
            <div class="bg-black/5 light-mode:bg-slate-100 p-2 rounded-lg text-center border border-black/5">
                <p class="text-[8px] uppercase font-bold text-slate-500">Fatura</p>
                <p id="card-cartoes" class="text-xs font-bold text-rose-500 val-field">R$ 0,00</p>
            </div>
            <div class="bg-black/5 light-mode:bg-slate-100 p-2 rounded-lg text-center border border-black/5">
                <p class="text-[8px] uppercase font-bold text-slate-500">Saldo</p>
                <p id="card-saldo" class="text-xs font-bold text-blue-500 val-field">R$ 0,00</p>
            </div>
            <div class="bg-black/5 light-mode:bg-slate-100 p-2 rounded-lg text-center border border-black/5">
                <p class="text-[8px] uppercase font-bold text-slate-500">Saldo Final</p>
                <p id="card-liquido" class="text-xs font-bold text-cyan-500 val-field">R$ 0,00</p>
            </div>
        </div>
    </header>

    <main id="chat-box"></main>

    <footer class="p-3 bg-transparent shrink-0">
        <div class="flex gap-2 items-center bg-[var(--input-bg)] rounded-full px-4 py-1 shadow-2xl border border-slate-700/30">
            <input type="text" id="user-input" placeholder="Ex: Recebi 1000 | Gastei 50" 
                class="w-full bg-transparent py-3 focus:outline-none text-sm text-inherit"
                onkeydown="if(event.key==='Enter') processarMensagem()">
            <button onclick="processarMensagem()" class="text-blue-500 p-2">
                <i class="fas fa-paper-plane text-xl"></i>
            </button>
        </div>
    </footer>

    <div id="modal" class="modal">
        <div class="bg-[var(--card)] p-6 rounded-2xl w-80 shadow-2xl">
            <h3 class="font-bold mb-4">Editar</h3>
            <input type="text" id="edit-input" class="w-full p-3 rounded-lg border bg-transparent mb-4 text-inherit">
            <div class="flex justify-between items-center">
                <button onclick="excluirMensagem()" class="text-rose-500">Excluir</button>
                <button onclick="fecharModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        let transacoes = JSON.parse(localStorage.getItem('bankday_transacoes') || '[]');
        let idEditando = null;
        let mesAtual = localStorage.getItem('bankday_mesAtual');
        
        if (!mesAtual) {
            const hoje = new Date();
            mesAtual = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
            localStorage.setItem('bankday_mesAtual', mesAtual);
        }

        function mudarMes(direcao) {
            const [ano, mes] = mesAtual.split('-').map(Number);
            const data = new Date(ano, mes - 1 + direcao, 1);
            mesAtual = `${data.getFullYear()}-${String(data.getMonth() + 1).padStart(2, '0')}`;
            localStorage.setItem('bankday_mesAtual', mesAtual);
            atualizarMes();
            atualizarCalculos();
        }

        function atualizarMes() {
            const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            const [ano, mes] = mesAtual.split('-');
            document.getElementById('mesAtual').textContent = `${meses[parseInt(mes)-1]} ${ano}`;
        }

        function processarMensagem() {
            const input = document.getElementById('user-input');
            if (!input.value.trim()) return;

            const id = Date.now();
            const data = new Date().toISOString();
            transacoes.push({ id, texto: input.value, data });
            localStorage.setItem('bankday_transacoes', JSON.stringify(transacoes));
            
            adicionarMensagemNaTela(input.value, id);
            atualizarCalculos();
            input.value = '';
        }

        function adicionarMensagemNaTela(texto, id) {
            const chat = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = "bg-blue-600 text-white self-end p-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm shadow-md message-fade cursor-pointer";
            div.onclick = () => abrirModal(id);
            div.innerText = texto;
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            setTimeout(() => { if(div) div.remove(); }, 8000);
        }

        function atualizarCalculos() {
            let e = 0, s = 0, c = 0;
            const inK = ['recebi', 'entrou', 'ganhei', 'salario', 'pagamento'];
            const outK = ['gastei', 'comprei', 'paguei'];
            
            const [ano, mesNum] = mesAtual.split('-').map(Number);
            const transacoesMes = transacoes.filter(t => {
                const dt = new Date(t.data);
                return dt.getMonth() === mesNum - 1 && dt.getFullYear() === ano;
            });

            transacoesMes.forEach(t => {
                const txt = t.texto.toLowerCase();
                const valorMatch = txt.match(/\d+([.,]\d{1,2})?/);
                if (!valorMatch) return;
                const valor = parseFloat(valorMatch[0].replace(',', '.'));

                if (inK.some(k => txt.includes(k))) e += valor;
                else if (outK.some(k => txt.includes(k))) {
                    if (txt.includes('cartão') || txt.includes('cartao') || txt.includes('x')) c += valor;
                    else s += valor;
                }
            });

            const saldo = e - s;
            const formatar = v => `R$ ${v.toFixed(2).replace('.',',')}`;
            
            document.getElementById('card-entradas').innerText = formatar(e);
            document.getElementById('card-saidas').innerText = formatar(s);
            document.getElementById('card-saldo').innerText = formatar(saldo);
            document.getElementById('card-cartoes').innerText = formatar(c);
            document.getElementById('card-liquido').innerText = formatar(saldo - c);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-icon').className = isLight? 'fas fa-sun text-orange-500' : 'fas fa-moon text-blue-500';
        }

        function toggleVisibility() {
            document.querySelectorAll('.val-field').forEach(f => f.classList.toggle('hidden-val'));
            document.getElementById('eye-icon').classList.toggle('fa-eye-slash');
        }

        function abrirModal(id) {
            idEditando = id;
            const t = transacoes.find(x => x.id === id);
            document.getElementById('edit-input').value = t.texto;
            document.getElementById('modal').style.display = 'flex';
        }

        function fecharModal() {
            const novoTxt = document.getElementById('edit-input').value;
            const t = transacoes.find(x => x.id === idEditando);
            if(t) t.texto = novoTxt;
            localStorage.setItem('bankday_transacoes', JSON.stringify(transacoes));
            atualizarCalculos();
            document.getElementById('modal').style.display = 'none';
        }

        function excluirMensagem() {
            transacoes = transacoes.filter(x => x.id!== idEditando);
            localStorage.setItem('bankday_transacoes', JSON.stringify(transacoes));
            const el = document.getElementById(`msg-${idEditando}`);
            if(el) el.remove();
            atualizarCalculos();
            document.getElementById('modal').style.display = 'none';
        }

        // Init
        atualizarMes();
        atualizarCalculos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Day Pro - Slim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --header: #1e293b; --text: #f8fafc; --card-inner: #334155; }
        .light-mode { --bg: #f8fafc; --header: #ffffff; --text: #0f172a; --card-inner: #e2e8f0; }

        body { background-color: var(--bg); color: var(--text); transition: background 0.3s ease; }
        header { background-color: var(--header); border-bottom: 1px solid rgba(0,0,0,0.1); }
        
        .chat-container { height: calc(100vh - 220px); overflow-y: auto; }
        .message-fade { animation: fadeOut 1s forwards 7s; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; align-items: center; justify-content: center; }
        .hidden-val { filter: blur(5px) grayscale(1); }
        .card-mini { background-color: var(--card-inner); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="p-3 shadow-md">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-lg font-bold text-blue-500">Bank Day Pro</h1>
            <div class="flex gap-4">
                <button onclick="toggleVisibility()"><i id="eye-icon" class="fas fa-eye"></i></button>
                <button onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2">
            <div class="col-span-2 p-2 rounded-lg bg-blue-600 text-white text-center">
                <p class="text-[9px] uppercase opacity-80">Líquido</p>
                <p id="card-liquido" class="text-lg font-black val-field leading-tight">R$ 0,00</p>
            </div>
            <div class="card-mini p-1 rounded-lg text-center">
                <p class="text-[8px] uppercase opacity-70">Saldo</p>
                <p id="card-saldo" class="text-xs font-bold text-blue-400 val-field">R$ 0,00</p>
            </div>
            <div class="card-mini p-1 rounded-lg text-center">
                <p class="text-[8px] uppercase opacity-70">Cartão</p>
                <p id="card-cartoes" class="text-xs font-bold text-rose-500 val-field">R$ 0,00</p>
            </div>
        </div>
    </header>

    <main id="chat-box" class="chat-container p-4 space-y-2 flex flex-col"></main>

    <footer class="p-3 bg-transparent">
        <div class="flex gap-2 bg-slate-800 light-mode:bg-white rounded-full px-4 py-1 border border-slate-700 light-mode:border-slate-300 items-center shadow-lg">
            <input type="text" id="user-input" placeholder="Gastei 50..." 
                class="w-full bg-transparent py-2 focus:outline-none text-inherit">
            <button onclick="processarMensagem()" class="text-blue-500 text-xl p-2">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <div id="modal" class="modal">
        <div class="bg-slate-800 light-mode:bg-white p-6 rounded-2xl w-80 border border-slate-700">
            <h3 class="font-bold mb-4">Editar</h3>
            <input type="text" id="edit-input" class="w-full p-2 rounded border mb-4 bg-transparent text-inherit">
            <div class="flex justify-between">
                <button onclick="excluirMensagem()" class="text-rose-500">Excluir</button>
                <button onclick="fecharModal()" class="font-bold text-blue-500">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        let transacoes = [];
        let idEditando = null;

        function processarMensagem() {
            const input = document.getElementById('user-input');
            if (!input.value) return;

            const id = Date.now();
            transacoes.push({ id, texto: input.value });
            adicionarMensagemNaTela(input.value, id);
            atualizarCalculos();
            input.value = '';
        }

        function adicionarMensagemNaTela(texto, id) {
            const chat = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = "bg-blue-500 text-white self-end p-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm relative group message-fade";
            div.onclick = () => abrirModal(id);
            div.innerHTML = `<span>${texto}</span>`;
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            setTimeout(() => { if(div) div.remove(); }, 8000);
        }

        function atualizarCalculos() {
            let e = 0, s = 0, c = 0;
            const entradaKeywords = ['recebi', 'entrou', 'ganhei', 'quitei'];
            const saidaKeywords = ['gastei', 'comprei', 'paguei'];

            transacoes.forEach(t => {
                const txt = t.texto.toLowerCase();
                const valorMatch = txt.match(/\d+([.,]\d{2})?/);
                if (!valorMatch) return;
                const valor = parseFloat(valorMatch[0].replace(',', '.'));

                if (entradaKeywords.some(k => txt.includes(k))) e += valor;
                else if (saidaKeywords.some(k => txt.includes(k))) {
                    if (txt.includes('cartão') || txt.includes('cartao') || txt.includes('3x')) c += valor;
                    else s += valor;
                }
            });

            document.getElementById('card-saldo').innerText = `R$ ${(e - s).toFixed(2)}`;
            document.getElementById('card-cartoes').innerText = `R$ ${c.toFixed(2)}`;
            document.getElementById('card-liquido').innerText = `R$ ${(e - s - c).toFixed(2)}`;
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-icon').className = isLight ? 'fas fa-sun' : 'fas fa-moon';
        }

        function toggleVisibility() {
            document.querySelectorAll('.val-field').forEach(f => f.classList.toggle('hidden-val'));
        }

        function abrirModal(id) {
            idEditando = id;
            const t = transacoes.find(x => x.id === id);
            document.getElementById('edit-input').value = t.texto;
            document.getElementById('modal').style.display = 'flex';
        }

        function fecharModal() {
            const novoTxt = document.getElementById('edit-input').value;
            const t = transacoes.find(x => x.id === idEditando);
            if(t) t.texto = novoTxt;
            atualizarCalculos();
            document.getElementById('modal').style.display = 'none';
        }

        function excluirMensagem() {
            transacoes = transacoes.filter(x => x.id !== idEditando);
            const el = document.getElementById(`msg-${idEditando}`);
            if(el) el.remove();
            atualizarCalculos();
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>

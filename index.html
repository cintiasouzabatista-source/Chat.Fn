<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BankDay - Controle Financeiro</title>
    
    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#25d366">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BankDay">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="header-top">
        <h1>BankDay</h1>
        <div class="header-actions">
            <button id="btnTema" class="icon-btn" onclick="alternarTema()">🌙</button>
            <button id="olho" class="icon-btn" onclick="alternarValores()">👁️</button>
            <button class="icon-btn" onclick="toggleMenuMais()">⋮</button>
        </div>
    </div>

    <div class="mes-navegacao">
        <button onclick="mudarMes(-1)" class="btn-mes">‹</button>
        <h2 id="mesAtual"></h2>
        <button onclick="mudarMes(1)" class="btn-mes">›</button>
    </div>
<!-- MODAL RESUMO CARDS -->
<div id="modal-resumo-card" class="modal" style="display: none;">
    <div class="bg-slate-900 w-full max-w-md rounded-2xl border border-slate-700 max-h-[90vh] flex flex-col">
        <div class="flex justify-between items-center p-4 border-b border-slate-700">
            <div>
                <h3 id="resumo-titulo" class="text-lg font-bold">Resumo</h3>
                <p id="resumo-subtitulo" class="text-xs text-slate-400">Mês atual</p>
            </div>
            <button onclick="fecharResumoCard()" class="text-slate-400 hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div id="resumo-total" class="bg-slate-800 p-4 border-b border-slate-700">
            <p class="text-xs text-slate-400 mb-1">Total do período</p>
            <p id="resumo-valor-total" class="text-2xl font-black text-emerald-500">R$ 0,00</p>
        </div>
        <div id="resumo-lista" class="flex-1 overflow-y-auto p-4 space-y-2">
            <!-- Lista vai aqui -->
        </div>
    </div>
</div>
    <!-- 5 CARDS: Entrada-Saida=Saldo-Fatura=SaldoFinal -->
  <!-- CARDS -->
<div class="grid grid-cols-2 gap-3 mb-4">
    <div onclick="abrirResumo('entrada')" class="bg-slate-800 p-4 rounded-lg border border-slate-700 cursor-pointer hover:bg-slate-700 transition-all">
        <p class="text-xs text-slate-400 mb-1">Entradas</p>
        <p id="card-entradas" class="text-xl font-black text-emerald-500">R$ 0,00</p>
    </div>
    <div onclick="abrirResumo('saida')" class="bg-slate-800 p-4 rounded-lg border border-slate-700 cursor-pointer hover:bg-slate-700 transition-all">
        <p class="text-xs text-slate-400 mb-1">Saídas</p>
        <p id="card-saidas" class="text-xl font-black text-orange-500">R$ 0,00</p>
    </div>
    <div onclick="abrirResumo('saldo')" class="bg-slate-800 p-4 rounded-lg border border-slate-700 cursor-pointer hover:bg-slate-700 transition-all">
        <p class="text-xs text-slate-400 mb-1">Saldo</p>
        <p id="card-saldo" class="text-xl font-black text-blue-500">R$ 0,00</p>
    </div>
    <div onclick="abrirResumo('cartao')" class="bg-slate-800 p-4 rounded-lg border border-slate-700 cursor-pointer hover:bg-slate-700 transition-all">
        <p class="text-xs text-slate-400 mb-1">Cartões</p>
        <p id="card-cartoes" class="text-xl font-black text-rose-500">R$ 0,00</p>
    </div>
</div>
    

    <!-- Card de projeção, só aparece se ativar nos 3 pontinhos -->
    <div id="saldoProjetado" class="projecao-card" style="display:none">
        <span>Saldo Projetado Próximo Mês</span>
        <strong id="saldoProjValor">R$ 0,00</strong>
    </div>
</header>

<main class="chat-area" id="chat-area">
    <div class="chat-mensagens" id="chat-mensagens"></div>
</main>

<div class="input-area" id="input-area">
    <input type="text" id="inputMsg" placeholder="Ex: cafe 15 | recebi 500 salario | celular 1200 3x" 
           onkeydown="if(event.key==='Enter') enviar()">
    <button onclick="enviar()" class="btn-enviar">➤</button>
</div>

<!-- ABA EXTRATO -->
<div class="extrato-area" id="extrato-area" style="display:none">
    <div class="filtros">
        <input type="date" id="filtro-inicio" onchange="aplicarFiltros()">
        <input type="date" id="filtro-fim" onchange="aplicarFiltros()">
        <select id="filtro-categoria" onchange="aplicarFiltros()">
            <option value="">Todas Categorias</option>
        </select>
        <select id="filtro-banco" onchange="aplicarFiltros()">
            <option value="">Todas Contas/Cartões</option>
        </select>
    </div>
    
    <div class="resumo-filtro" id="resumoFiltro" style="display:none">
        <div><span>Entradas:</span><strong id="resumoEntradas">R$ 0,00</strong></div>
        <div><span>Saídas:</span><strong id="resumoSaidas">R$ 0,00</strong></div>
        <div><span>Saldo:</span><strong id="resumoSaldo">R$ 0,00</strong></div>
    </div>
    
    <div class="lista-transacoes" id="lista-transacoes"></div>
</div>

<!-- ABA GRAFICOS -->
<div class="graficos-area" id="graficos-area" style="display:none">
    <div class="tabs-grafico">
        <button class="tab-grafico active" onclick="mostrarGrafico('despesas')">Despesas</button>
        <button class="tab-grafico" onclick="mostrarGrafico('receitas')">Receitas vs Despesas</button>
        <button class="tab-grafico" onclick="mostrarGrafico('bancos')">Por Banco</button>
    </div>
    <div class="grafico-container">
        <canvas id="chartCanvas"></canvas>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button class="nav-item active" onclick="trocarAba('chat')">
        <span>💬</span>
        <span>Chat</span>
    </button>
    <button class="nav-item" onclick="trocarAba('extrato')">
        <span>📋</span>
        <span>Extrato</span>
    </button>
    <button class="nav-item" onclick="trocarAba('graficos')">
        <span>📊</span>
        <span>Gráficos</span>
    </button>
    <button class="nav-item" onclick="toggleMenuMais()">
        <span>⋮</span>
        <span>Mais</span>
    </button>
</nav>

<!-- MODAL CONTAS/CARTÕES -->
<div id="modal-conta" class="modal" style="display:none">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Gerenciar Contas e Cartões</h3>
            <button onclick="fecharModal('modal-conta')">✕</button>
        </div>
        
        <div class="modal-body">
            <div class="form-section">
                <h4>Contas</h4>
                <div class="input-group">
                    <input type="text" id="conta-nome" placeholder="Nome da conta">
                    <input type="number" id="conta-saldo" placeholder="Saldo inicial" step="0.01">
                    <button onclick="addTempConta()" class="btn-add">+</button>
                </div>
                <div id="lista-contas-temp" class="lista-temp"></div>
            </div>
            
            <div class="form-section">
                <h4>Cartões</h4>
                <div class="input-group">
                    <input type="text" id="cartao-nome" placeholder="Nome do cartão">
                    <input type="number" id="cartao-fechamento" placeholder="Dia fechamento" min="1" max="31">
                    <input type="number" id="cartao-vencimento" placeholder="Dia vencimento" min="1" max="31">
                    <button onclick="addTempCartao()" class="btn-add">+</button>
                </div>
                <div id="lista-cartoes-temp" class="lista-temp"></div>
            </div>
        </div>
        
        <div class="modal-footer">
            <button onclick="fecharModal('modal-conta')" class="btn-cancelar">Cancelar</button>
            <button onclick="finalizarCadastro()" class="btn-salvar">Salvar</button>
        </div>
    </div>
</div>

<!-- MODAL EDITAR -->
<div id="modal-editar" class="modal" style="display:none">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Editar Transação</h3>
            <button onclick="fecharModal('modal-editar')">✕</button>
        </div>
        
        <div class="modal-body">
            <div class="form-group">
                <label>Descrição</label>
                <input type="text" id="edit-desc">
            </div>
            <div class="form-group">
                <label>Valor</label>
                <input type="number" id="edit-valor" step="0.01">
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="edit-tipo">
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
            </div>
            <div class="form-group">
                <label>Método</label>
                <select id="edit-metodo">
                    <option value="conta">Conta</option>
                    <option value="cartao">Cartão</option>
                    <option value="dinheiro">Dinheiro</option>
                </select>
            </div>
            <div class="form-group">
                <label>Banco/Cartão</label>
                <select id="edit-banco"></select>
            </div>
            <div class="form-group">
                <label>Categoria</label>
                <select id="edit-categoria"></select>
            </div>
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="edit-data">
            </div>
        </div>
        
        <div class="modal-footer">
            <button onclick="deletarTransacao()" class="btn-excluir">Excluir</button>
            <button onclick="salvarEdicao()" class="btn-salvar">Salvar</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
